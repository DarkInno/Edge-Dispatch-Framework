# =============================================================================
# 本地开发/演示 All-in-One 部署
# =============================================================================
# 一键启动全套服务用于本地开发和功能演示。
# 生产环境请使用分离部署: docker-compose.cp.yml + docker-compose.edge.yml
#
# 启动: docker compose up -d
# 停止: docker compose down -v
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edf
      POSTGRES_PASSWORD: edf
      POSTGRES_DB: edf
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edf"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  control-plane:
    build:
      context: .
      dockerfile: docker/Dockerfile.control-plane
    ports:
      - "8080:8080"
    environment:
      CP_LISTEN_ADDR: ":8080"
      CP_PG_URL: "postgres://edf:edf@postgres:5432/edf?sslmode=disable&pool_max_conns=25&pool_min_conns=5&pool_max_conn_lifetime=30m&pool_max_conn_idle_time=10m&pool_health_check_period=30s"
      CP_REDIS_ADDR: "redis:6379"
      CP_TOKEN_SECRET: "demo-secret-change-in-production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Gateway - Unified reverse proxy with tunnel support (v0.3)
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "8880:8880"   # HTTP proxy
      - "7700:7700"   # Tunnel server
    environment:
      GW_LISTEN_ADDR: ":8880"
      GW_TUNNEL_ADDR: ":7700"
      GW_CONTROL_PLANE_URL: "http://control-plane:8080"
      GW_AUTH_TOKEN: "demo-tunnel-token-change-in-production"
    depends_on:
      - control-plane

  # Public edge agents (direct access)
  edge-agent-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.edge-agent
    ports:
      - "9090:9090"
    environment:
      EA_LISTEN_ADDR: ":9090"
      EA_CONTROL_PLANE_URL: "http://control-plane:8080"
      EA_CACHE_DIR: "/tmp/edf-cache-1"
      EA_CACHE_MAX_GB: "1"
      EA_ORIGIN_URL: "http://origin:7070"
    depends_on:
      - control-plane

  edge-agent-2:
    build:
      context: .
      dockerfile: docker/Dockerfile.edge-agent
    ports:
      - "9091:9090"
    environment:
      EA_LISTEN_ADDR: ":9090"
      EA_CONTROL_PLANE_URL: "http://control-plane:8080"
      EA_CACHE_DIR: "/tmp/edf-cache-2"
      EA_CACHE_MAX_GB: "1"
      EA_ORIGIN_URL: "http://origin:7070"
    depends_on:
      - control-plane

  # NAT edge agent (behind NAT, uses tunnel) - v0.3
  edge-agent-nat:
    build:
      context: .
      dockerfile: docker/Dockerfile.edge-agent
    environment:
      EA_LISTEN_ADDR: ":9090"
      EA_CONTROL_PLANE_URL: "http://control-plane:8080"
      EA_CACHE_DIR: "/tmp/edf-cache-nat"
      EA_CACHE_MAX_GB: "1"
      EA_ORIGIN_URL: "http://origin:7070"
      EA_NAT_MODE: "true"
      EA_TUNNEL_SERVER_ADDR: "gateway:7700"
      EA_TUNNEL_AUTH_TOKEN: "demo-tunnel-token-change-in-production"
    depends_on:
      - control-plane
      - gateway

  origin:
    build:
      context: .
      dockerfile: docker/Dockerfile.origin
    ports:
      - "7070:7070"
    environment:
      ORIGIN_LISTEN_ADDR: ":7070"
      ORIGIN_DATA_DIR: "/tmp/edf-origin"

  dns-adapter:
    build:
      context: .
      dockerfile: docker/Dockerfile.dns-adapter
    ports:
      - "5353:5353/udp"
    environment:
      DNS_LISTEN_ADDR: ":5353"
      DNS_CONTROL_PLANE_URL: "http://control-plane:8080"
      DNS_DOMAIN: "edge.local"
      DNS_TTL_SECONDS: "30"
    depends_on:
      - control-plane

  stress:
    build:
      context: .
      dockerfile: docker/Dockerfile.stress
    profiles: ["stress"]
    depends_on:
      - origin
      - control-plane
      - edge-agent-1
    command:
      - "-mode=bench-origin"
      - "-c=200"
      - "-d=15s"
      - "-origin=http://origin:7070"
      - "-objects=200"
      - "-no-body=true"

volumes:
  pgdata:
